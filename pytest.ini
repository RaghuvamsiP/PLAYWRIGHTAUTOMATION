[pytest]
addopts = -s -v --alluredir=reports/allure-results --clean-alluredir
testpaths = tests
markers =
    smoke: Smoke tests for quick sanity checks
    sanity: Sanity tests for core functionality validation
    regression: Full regression tests
    negative: Negative tests for invalid inputs and error handling
    ui: UI tests
    api: API tests
    no_balance_restore: Skip the auto-restore wallet-balance fixture for this test
norecursedirs = venv .git __pycache__
